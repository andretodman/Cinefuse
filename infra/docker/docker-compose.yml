services:
  postgres:
    image: postgres:16-alpine
    container_name: cinefuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cinefuse
      POSTGRES_USER: cinefuse
      POSTGRES_PASSWORD: cinefuse
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cinefuse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
