name: CinefuseAppleHost
options:
  deploymentTarget:
    iOS: "17.0"
packages:
  CinefuseAppleCore:
    path: ../../packages/cinefuse-apple-core
targets:
  CinefuseAppleHost:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pubfuse.cinefuse
        PRODUCT_NAME: CinefuseAppleHost
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Cinefuse
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Cinefuse uses photos and videos you choose from your library as reference material for sound blueprints and character training.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        SWIFT_VERSION: 5.9
    dependencies:
      - package: CinefuseAppleCore
        product: CinefuseAppleCore
    scheme:
      testTargets: []
