name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node:
    name: Node Workspace Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Contract test
        run: pnpm contract-test

  python-render-worker:
    name: Python Render Worker Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff
      - name: Ruff
        run: python -m ruff check services/render-worker
      - name: Pytest
        run: python -m pytest services/render-worker/tests
